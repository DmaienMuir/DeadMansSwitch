<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dead Man's Switch v0.6.21</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@300;400;500&display=swap');

:root {
  --bg: #0a0908;
  --surface: #131110;
  --surface2: #1a1815;
  --gold: #c9a84c;
  --gold2: #e8d08a;
  --red: #cc3333;
  --green: #3a8a5a;
  --blue: #4a7aaa;
  --cream: #e8e0d0;
  --dim: #6a6058;
  --border: rgba(201,168,76,0.2);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── SCREENS ── */
.screen { display: none; width: 100%; max-width: 900px; padding: 20px; }
.screen.active { display: flex; flex-direction: column; gap: 12px; }

/* ── TITLE ── */
#title-screen {
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 24px;
  text-align: center;
}

.title-logo {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  text-shadow: 0 0 80px rgba(201,168,76,0.3);
  text-align: center;
}
.title-logo-eyebrow {
  display: block;
  font-size: clamp(14px, 3vw, 22px);
  letter-spacing: 4px;
  font-weight: 700;
  text-transform: uppercase;
  opacity: 0.75;
  margin-bottom: 2px;
}
.title-logo-main {
  display: block;
  font-size: clamp(52px, 11vw, 104px);
  letter-spacing: -2px;
}

.title-suits { font-size: 28px; letter-spacing: 16px; opacity: 0.4; }
.title-sub { color: var(--dim); font-size: 12px; letter-spacing: 2px; max-width: 400px; line-height: 1.8; }

/* ── RELIC PICK ── */
#relic-screen { align-items: center; min-height: 100vh; justify-content: center; gap: 16px; }
.relic-options { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 560px; }
.relic-opt {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 18px 20px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}
.relic-opt:hover { border-color: var(--gold); background: var(--surface2); }
.relic-opt .rname { color: var(--gold); font-weight: 500; font-size: 15px; margin-bottom: 4px; }
.relic-opt .rdesc { color: var(--dim); font-size: 11px; line-height: 1.6; }

/* ── GAME LAYOUT ── */
#game-screen { min-height: 100vh; padding-bottom: 40px; }

.hud {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 12px 16px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 8px;
}
.hud-cell { text-align: center; }
.hud-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin-bottom: 2px; }
.hud-val { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--gold); }
.hud-val.green { color: var(--green); }
.hud-val.red { color: var(--red); }

.score-bar-wrap { background: var(--surface2); height: 6px; border-radius: 0; margin-top: 4px; }
.score-bar { height: 6px; background: var(--gold); transition: width 0.4s; border-radius: 0; }

.relics-row {
  display: flex; gap: 6px; flex-wrap: wrap;
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  min-height: 36px;
  align-items: center;
}
.relic-badge {
  padding: 3px 10px;
  background: rgba(201,168,76,0.1);
  border: 1px solid var(--border);
  color: var(--gold);
  font-size: 10px;
  letter-spacing: 1px;
}
.red-king-badge {
  padding: 3px 10px;
  background: rgba(204,51,51,0.15);
  border: 1px solid rgba(204,51,51,0.4);
  color: var(--red);
  font-size: 10px;
  letter-spacing: 1px;
  animation: pulse 1s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* ── MIDDLE + HAND AREA ── */
.play-area {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 12px;
}

.middle-area {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.middle-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); }
.middle-card {
  width: 80px; height: 112px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #f5f0e8;
  border-radius: 4px;
  font-family: 'Playfair Display', serif;
  font-size: 32px; font-weight: 900;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  position: relative;
  transition: all 0.3s;
}
.middle-card .suit-corner {
  position: absolute; top: 6px; left: 8px;
  font-size: 12px; font-weight: 700;
}
.middle-card .suit-corner.br {
  top: auto; bottom: 6px; left: auto; right: 8px;
  transform: rotate(180deg);
}
.match-hint { font-size: 10px; color: var(--dim); text-align: center; line-height: 1.6; }

.hand-area {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.hand-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); }
.cards-grid {
  display: flex; flex-wrap: wrap; gap: 8px;
}

/* ── CARD ── */
.card {
  width: 64px; height: 90px;
  background: #ffffff;
  border-radius: 4px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer;
  position: relative;
  transition: transform 0.15s, box-shadow 0.15s, outline 0.1s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 900;
  user-select: none;
}
.card .csuit { font-size: 11px; font-weight: 700; }
.card .corner { position: absolute; top: 4px; left: 6px; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: flex-start; line-height: 1.1; }
.card .corner.br { top: auto; bottom: 4px; left: auto; right: 6px; transform: rotate(180deg); align-items: flex-end; }
.card.legal { outline: 2px solid var(--green); cursor: pointer; }
.card.legal:hover { transform: translateY(-6px); box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
.card.illegal { opacity: 0.45; cursor: default; }
.card.selected { outline: 3px solid var(--gold); transform: translateY(-8px); box-shadow: 0 10px 24px rgba(0,0,0,0.6); }
.card.red-card { color: #cc2222; }
.card.black-card { color: #111; }

/* ── ACTIONS ── */
.actions {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
}
.btn {
  padding: 8px 18px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--cream);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}
.btn:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
.btn:disabled { opacity: 0.3; cursor: default; }
.btn.primary { border-color: var(--gold); color: var(--gold); }
.btn.danger { border-color: rgba(204,51,51,0.5); color: var(--red); }
.btn.green { border-color: rgba(58,138,90,0.5); color: var(--green); }

/* ── LOG ── */
.log-area {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 12px 16px;
  max-height: 180px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.log-entry { font-size: 11px; line-height: 1.5; }
.log-entry.gold { color: var(--gold); }
.log-entry.red { color: var(--red); }
.log-entry.green { color: var(--green); }
.log-entry.blue { color: var(--blue); }
.log-entry.dim { color: var(--dim); }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 28px;
  max-width: 560px;
  width: 90%;
  display: flex; flex-direction: column; gap: 16px;
  max-height: 90vh; overflow-y: auto;
}
.modal h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 20px; }
.modal p { color: var(--dim); font-size: 12px; line-height: 1.7; }
.modal-cards { display: flex; flex-wrap: wrap; gap: 8px; }
.modal-opts { display: flex; flex-direction: column; gap: 6px; }
.modal-opt {
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 12px;
}
.modal-opt:hover { border-color: var(--gold); color: var(--gold); }


/* ── ROUND BANNER ── */
.round-banner {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.round-banner h2 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); }

/* ── END SCREEN ── */
#end-screen { align-items: center; justify-content: center; min-height: 100vh; text-align: center; gap: 20px; }
.end-title { font-family: 'Playfair Display', serif; font-size: 56px; font-weight: 900; }
.end-title.win { color: var(--gold); }
.end-title.lose { color: var(--red); }

/* Boss screen */
.boss-eyebrow { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--red); opacity: 0.8; }
.boss-name { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 900; color: #ff4444; letter-spacing: 2px; text-shadow: 0 0 30px rgba(255,60,60,0.4); }
.boss-art { font-size: 72px; line-height: 1; filter: drop-shadow(0 0 16px rgba(255,60,60,0.5)); }
.boss-rule-box { background: rgba(180,30,30,0.12); border: 1px solid rgba(255,60,60,0.25); border-radius: 8px; padding: 16px 20px; width: 100%; box-sizing: border-box; text-align: left; }
.boss-rule-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--red); margin-bottom: 8px; }
.boss-rule-desc { font-size: 13px; color: var(--cream); line-height: 1.7; }
.boss-rule-note { font-size: 11px; color: var(--dim); margin-top: 8px; font-style: italic; }
@keyframes bossFlicker { 0%,100%{opacity:1} 50%{opacity:0.85} }
.boss-name { animation: bossFlicker 2.5s ease-in-out infinite; }

/* ── UTILS ── */
.section-head {
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--dim); padding: 4px 0;
}
.gold { color: var(--gold); }
.red-c { color: var(--red); }
.green-c { color: var(--green); }
.dim { color: var(--dim); }
.sep { border: none; border-top: 1px solid var(--border); }

@media (max-width: 600px) {
  .play-area { grid-template-columns: 1fr; }
  .hud { grid-template-columns: 1fr 1fr; }
  .shop-grid { grid-template-columns: 1fr; }
}
/* ── CARD TOOLTIP ── */
.card-tooltip {
  position: fixed;
  z-index: 200;
  background: #1a1815;
  border: 1px solid var(--border);
  padding: 10px 14px;
  width: 190px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  box-shadow: 0 8px 24px rgba(0,0,0,0.7);
}
.card-tooltip.visible { opacity: 1; }
.card-tooltip .tt-name { font-family: 'Playfair Display', serif; font-size: 15px; margin-bottom: 6px; }
.card-tooltip .tt-score { color: var(--gold); font-size: 11px; margin-bottom: 6px; }
.card-tooltip .tt-power { color: #8ab4d8; font-size: 11px; line-height: 1.6; }
.card-tooltip .tt-sep { border: none; border-top: 1px solid var(--border); margin: 6px 0; }


/* ── DECK WIDGET ── */
#deck-widget {
  display: inline-flex; align-items: center; gap: 8px;
  cursor: pointer; user-select: none;
  padding: 4px 8px 4px 4px;
  border-radius: 4px;
  border: 1px solid rgba(201,168,76,0.2);
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}
#deck-widget:hover { border-color: var(--gold); background: rgba(201,168,76,0.05); }
.deck-stack-icon {
  position: relative; width: 26px; height: 36px; flex-shrink: 0;
}
.deck-stack-icon .ds-card {
  position: absolute;
  width: 26px; height: 36px;
  background: linear-gradient(135deg,#1a1a2e,#0e0e1a);
  border: 1px solid rgba(201,168,76,0.4);
  border-radius: 3px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
.deck-count-badge {
  font-size: 11px; color: var(--dim);
  white-space: nowrap;
}

/* ── POWER ANIMATIONS ── */
@keyframes pile-shuffle {
  0%   { transform: rotate(var(--rot)) translateX(0); opacity:1; }
  30%  { transform: rotate(calc(var(--rot) + 20deg)) translateX(30px) translateY(-10px); opacity:0.7; }
  60%  { transform: rotate(calc(var(--rot) - 15deg)) translateX(-20px) translateY(5px); opacity:0.7; }
  100% { transform: rotate(var(--rot)); opacity:1; }
}
.pile-card.shuffling {
  animation: pile-shuffle 0.55s ease-in-out forwards;
}

.play-zone {
  min-height: 110px;
  border: 2px dashed rgba(201,168,76,0.25);
  border-radius: 4px;
  display: flex; flex-wrap: wrap; gap: 8px;
  align-items: center; padding: 10px 12px;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.play-zone.drag-over {
  border-color: var(--gold);
  background: rgba(201,168,76,0.06);
}
.discard-zone {
  min-height: 110px;
  border: 2px dashed rgba(180,60,60,0.3);
  border-radius: 4px;
  display: flex; flex-wrap: wrap; gap: 8px;
  align-items: center; padding: 10px 12px;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
  flex: 0 0 90px;
}
.discard-zone.drag-over {
  border-color: var(--red);
  background: rgba(180,60,60,0.08);
}
.discard-zone.discard-nudge {
  animation: discard-pulse 1.8s ease-in-out infinite;
}
@keyframes discard-pulse {
  0%   { border-color: rgba(180,60,60,0.3); box-shadow: none; }
  50%  { border-color: rgba(204,51,51,0.85); box-shadow: 0 0 10px 2px rgba(204,51,51,0.3); }
  100% { border-color: rgba(180,60,60,0.3); box-shadow: none; }
}
.discard-zone-label {
  position: absolute; top: 6px; left: 10px;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim);
}
.discard-zone-hint {
  color: var(--dim); font-size: 10px; width: 100%; text-align: center;
  pointer-events: none; line-height: 1.5;
}
.zones-row {
  display: flex; gap: 8px; align-items: stretch;
}
.zones-row .play-zone { flex: 1; }
.play-zone-label {
  position: absolute; top: 6px; left: 10px;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim);
}
.play-zone-hint {
  color: var(--dim); font-size: 11px; width: 100%; text-align: center;
  pointer-events: none;
}
.play-zone .card.staged {
  outline: 2px solid var(--gold);
  cursor: grab;
  opacity: 1 !important;
}
.card.dragging { opacity: 0.35 !important; }

/* ── PILE STACK ── */
.pile-stack {
  position: relative;
  width: 80px;
  height: 112px;
  margin: 0 auto;
}
.pile-stack .pile-card {
  position: absolute;
  width: 80px; height: 112px;
  background: #f5f0e8;
  border-radius: 4px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 28px; font-weight: 900;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.pile-stack .pile-card .pc-corner {
  position: absolute; top: 5px; left: 7px;
  font-size: 11px; font-weight: 700;
  display: flex; flex-direction: column; line-height: 1.1;
}
.pile-stack .pile-card .pc-corner.br {
  top: auto; bottom: 5px; left: auto; right: 7px;
  transform: rotate(180deg);
}

/* ── SCORE PREVIEW BAR ── */
.score-bar-preview {
  height: 6px;
  background: rgba(201,168,76,0.35);
  transition: width 0.2s;
  border-radius: 0;
  position: absolute;
  top: 0; left: 0;
}
.score-bar-wrap { position: relative; overflow: hidden; }

/* ── CARD FLY ANIMATION ── */
.card-fly {
  position: fixed; z-index: 450; pointer-events: none;
  will-change: transform, left, top, opacity;
}
.card-fly.flying {
  transition: left var(--fly-dur,0.32s) cubic-bezier(0.4,0,0.2,1),
              top  var(--fly-dur,0.32s) cubic-bezier(0.4,0,0.2,1),
              transform var(--fly-dur,0.32s) ease,
              opacity   var(--fly-dur,0.32s) ease;
}
.play-zone.animating { pointer-events: none; opacity: 0.6; }

/* ── PLAY HAND BUTTON ── */
.play-hand-btn {
  padding: 10px 24px;
  border: 2px solid var(--gold);
  background: rgba(201,168,76,0.1);
  color: var(--gold);
  font-family: 'DM Mono', monospace;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 1px;
}
.play-hand-btn:hover:not(:disabled) {
  background: rgba(201,168,76,0.2);
  box-shadow: 0 0 16px rgba(201,168,76,0.2);
}
.play-hand-btn:disabled { opacity: 0.25; cursor: default; border-color: var(--dim); color: var(--dim); background: none; }
.staged-preview {
  font-size: 11px; color: var(--gold); opacity: 0.8;
}

/* ── REWARD SCREEN ── */
.reward-actions {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 4px;
}
.reward-action-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 18px 14px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; transition: border-color 0.15s, background 0.15s;
  font-family: 'DM Mono', monospace;
}
.reward-action-btn:hover:not(:disabled) {
  border-color: var(--gold); background: var(--surface2);
}
.reward-action-btn:disabled { opacity: 0.25; cursor: default; }
.reward-action-btn.used { opacity: 0.3; pointer-events: none; border-style: dashed; }
.reward-action-icon { font-size: 28px; }
.reward-action-label { color: var(--gold); font-size: 13px; letter-spacing: 1px; }
.reward-action-desc { color: var(--dim); font-size: 10px; text-align: center; line-height: 1.5; }
.reward-cards-grid {
  display: flex; flex-wrap: wrap; gap: 10px;
  justify-content: center; padding: 16px 0;
}
.reward-card-opt {
  cursor: pointer; transition: transform 0.15s;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.reward-card-opt:hover { transform: translateY(-6px); }
.reward-card-opt.selected { transform: translateY(-8px); }
.reward-card-opt.selected .card { outline: 2px solid var(--gold); box-shadow: 0 0 12px rgba(201,168,76,0.5); }
.reward-card-opt .card-label {
  font-size: 9px; color: var(--dim); letter-spacing: 1px; text-align: center;
}
.reward-confirm-row {
  display: flex; gap: 10px; justify-content: center; margin-top: 12px;
}
.reward-relics-grid {
  display: flex; flex-direction: column; gap: 10px;
  padding: 8px 0;
}
.reward-relic-opt {
  background: var(--surface2); border: 1px solid var(--border);
  padding: 14px 16px; display: flex; gap: 14px; align-items: center;
  cursor: pointer; transition: border-color 0.15s;
}
.reward-relic-opt:hover { border-color: var(--gold); }
.reward-relic-art { font-size: 28px; flex-shrink: 0; }
.reward-relic-info { flex: 1; }
.reward-relic-name { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 15px; }
.reward-relic-tier { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; margin: 2px 0; }
.reward-relic-desc { color: var(--dim); font-size: 11px; line-height: 1.5; }
.reward-token {
  display: inline-block; width: 12px; height: 12px; border-radius: 50%;
  background: var(--gold); margin-right: 4px; vertical-align: middle;
}
.reward-token.spent { background: var(--surface2); border: 1px solid var(--border); }

/* ── OWNED RELICS IN REWARD ── */
.owned-relics-section {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.owned-relic-row {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  position: relative;
}
